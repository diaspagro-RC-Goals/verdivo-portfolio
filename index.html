<title>Posicionamento de Portfólio – Verdivo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{background:#eef1f0;font-size:13px;color:#1a1a1a}
.page{max-width:1440px;margin:0 auto;padding:14px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px 18px;margin-bottom:10px;gap:16px;flex-wrap:wrap}
.logo-img{height:40px;object-fit:contain}
.farmer-fields{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.fld{display:flex;flex-direction:column;gap:2px}
.fld label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.fld input{border:1px solid #ccc;border-radius:5px;padding:5px 8px;font-size:12px}
.modal-wrap{display:flex;flex-direction:column;gap:2px}
.modal-wrap label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.modal-btns{display:flex;gap:4px}
.modal-btn{padding:5px 14px;border:1px solid #ccc;border-radius:5px;cursor:pointer;font-size:12px;background:#f5f5f5;color:#555;font-weight:500}
.modal-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff}

/* PRINT-ONLY HEADER (built from same data, premium typography) */
.print-header{display:none}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:230px 1fr;gap:10px}

/* SIDE PANEL */
.panel{background:#fff;border:1px solid #ddd;border-radius:10px;padding:14px}
.panel h3{font-size:11.5px;font-weight:800;color:#1D9E75;border-bottom:2px solid #e8eee9;padding-bottom:7px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.fg{margin-bottom:9px}
.fg label{display:block;font-size:10px;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.fg select,.fg input{width:100%;border:1px solid #ccc;border-radius:5px;padding:6px 7px;font-size:12px}
.fg.fase select{border:1.5px solid #1D9E75;background:#f3fbf6;font-weight:600}
.add-btn{width:100%;padding:9px;background:#1D9E75;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;margin-top:6px;letter-spacing:.03em}
.add-btn:hover{background:#0F6E56}
.hint{font-size:10px;color:#999;margin-top:8px;line-height:1.4;font-style:italic}
.app-list{margin-top:12px;display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto}
.app-item{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:5px;border:1px solid #eee;background:#fafafa}
.app-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.app-info{flex:1;min-width:0}
.app-name{font-size:11px;font-weight:700;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-meta{font-size:10px;color:#888}
.app-rm{background:none;border:none;cursor:pointer;color:#bbb;font-size:17px;line-height:1;flex-shrink:0;padding:0 2px}
.app-rm:hover{color:#c00}
.empty-msg{font-size:11px;color:#bbb;text-align:center;padding:8px 0}

/* TIMELINE CARD */
.tl-card{background:#fff;border:1px solid #ddd;border-radius:10px;overflow:hidden}
.tl-top{display:flex;align-items:baseline;justify-content:space-between;padding:14px 18px 10px}
.tl-title{font-size:18px;font-weight:800;color:#16382a;letter-spacing:-.01em}
.tl-sub{font-size:12px;color:#888;margin-left:10px}
.tl-rule{height:3px;background:linear-gradient(to right,#1D9E75,#BA7517 35%,#eee 35%);margin:0 18px 10px}
.export-btn{padding:7px 16px;font-size:11.5px;border:1.5px solid #1D9E75;border-radius:6px;cursor:pointer;background:#fff;color:#1D9E75;font-weight:700}
.export-btn:hover{background:#1D9E75;color:#fff}

/* ESCALA IMAGE */
.escala-wrap{position:relative;width:100%;overflow:hidden;line-height:0;aspect-ratio:1400/620}
.escala-img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}

/* JANELAS ROW — tiled columns sized by real agronomic proportion */
.janelas-row{display:flex;border-top:1px solid #ddd;min-height:110px}
.jcol-dss {flex:0 0 9%;  max-width:9%}
.jcol-ts  {flex:0 0 9%;  max-width:9%}
.jcol-v4  {flex:0 0 14%; max-width:14%}
.jcol-r1  {flex:0 0 16%; max-width:16%}
.jcol-r3  {flex:0 0 17%; max-width:17%}
.jcol-r53 {flex:1 1 auto}

.janela-col{border-right:1px dashed #ddd;padding:8px 5px 12px}
.janela-col:last-child{border-right:none}
.j-header{font-size:9.5px;font-weight:800;color:#444;text-transform:uppercase;letter-spacing:.05em;text-align:center;border-bottom:1px solid #eee;padding-bottom:5px;margin-bottom:6px}
.app-cards{display:flex;flex-direction:column;gap:5px}

/* PRODUCT CARD — clickable to edit, × to delete */
.prod-card{position:relative;display:flex;align-items:center;gap:4px;border-radius:5px;padding:4px 5px;border-left:3px solid transparent;cursor:pointer;transition:filter .15s}
.prod-card:hover{filter:brightness(0.96)}
.prod-img{width:28px;height:34px;object-fit:contain;border-radius:3px;background:#111;flex-shrink:0}
.p-name{font-size:9px;font-weight:800;line-height:1.2}
.p-dose{font-size:8.5px;color:#888;line-height:1.15}
.card-x{position:absolute;top:-4px;right:-4px;width:15px;height:15px;border-radius:50%;background:#c0392b;color:#fff;font-size:10px;line-height:15px;text-align:center;cursor:pointer;opacity:0;transition:opacity .15s}
.prod-card:hover .card-x{opacity:1}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:14px;padding:9px 18px;border-top:1px solid #eee}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555;font-weight:600}
.legend-dot{width:9px;height:9px;border-radius:50%}

.footer-tag{padding:6px 18px 12px;font-size:9.5px;color:#aaa;text-align:right;font-style:italic}

/* PRINT — premium A4 landscape */
/* MOBILE — stack panel, vertical phase list instead of side-by-side columns, always-visible delete */
@media screen and (max-width:860px){
  .page{padding:8px}
  .header{flex-direction:column;align-items:stretch;padding:10px 12px}
  .logo-img{height:34px;margin-bottom:8px}
  .farmer-fields{flex-direction:column;align-items:stretch;gap:6px}
  .fld input{width:100%!important}
  .modal-wrap{flex-direction:row;align-items:center;justify-content:space-between;margin-top:4px}
  .modal-btns{flex:1}
  .modal-btn{flex:1;padding:9px 0;font-size:13px}
  .main{grid-template-columns:1fr}
  .panel{order:1}
  .tl-card{order:2}
  .fg select,.fg input{padding:9px 8px;font-size:13px}
  .add-btn{padding:12px;font-size:13px}
  .tl-top{flex-direction:column;align-items:flex-start;gap:8px}
  .tl-title{font-size:16px}
  .export-btn{width:100%;padding:11px;font-size:13px}
  .escala-wrap{aspect-ratio:1400/680}
  /* Vertical phase list instead of horizontal tiled columns */
  .janelas-row{flex-direction:column;border-top:2px solid #2c4a32}
  .janela-col{flex:1 1 auto!important;max-width:100%!important;border-right:none;border-bottom:1px solid #eee;padding:10px 8px}
  .janela-col:last-child{border-bottom:none}
  .j-header{text-align:left;font-size:11.5px}
  .app-cards{flex-direction:row;flex-wrap:wrap}
  .prod-card{flex:0 1 calc(50% - 4px)}
  .card-x{opacity:1;background:#c0392b}
}


  @page{size:297mm 210mm;margin:7mm}
  body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .panel,.export-btn,.modal-wrap,.farmer-fields{display:none!important}
  .header{border:none;border-bottom:2px solid #1D9E75;border-radius:0;padding:0 0 4px;margin-bottom:4px}
  .logo-img{height:28px}
  .main{grid-template-columns:1fr!important}
  .page{padding:0;max-width:100%}
  .tl-card{border:none;border-radius:0}
  .tl-title{font-size:15px}
  .tl-sub{font-size:10.5px}
  .tl-top{padding:0 0 4px}
  .tl-rule{margin:0 0 5px}
  .janelas-row{min-height:0}
  .legend{padding:5px 0}
  .footer-tag{padding:3px 0 0;font-size:8.5px}
}
</style>
</head>

<div class="page">

<!-- HEADER -->
<div class="header">
  <img class="logo-img" id="logo-img" src="" alt="Verdivo Agroscience">
  <div class="farmer-fields">

const CATEGORIAS={"Fisiol\u00f3gico": {"color": "#1D9E75", "produtos": [{"key": "Elysian", "nome": "Elysian"}, {"key": "Elyver", "nome": "Elyver"}, {"key": "Cytogen", "nome": "Cytogen"}, {"key": "Stand", "nome": "Stand"}, {"key": "AAtivus", "nome": "Attivus"}, {"key": "Verdmax", "nome": "VerdMax"}]}, "Nutricional": {"color": "#2E6DA4", "produtos": [{"key": "MN_ACTION", "nome": "MN Action"}, {"key": "VD_Boro", "nome": "VD Boro 10"}, {"key": "FIX_CoMoNi", "nome": "Fix CoMoNi"}, {"key": "MAGLeaf", "nome": "Mag Leaf"}, {"key": "Nitroverd", "nome": "NitroVerd"}, {"key": "VD_Mn", "nome": "VD Mn EDTA"}, {"key": "VD_Cobre", "nome": "VD Cobre EDTA"}, {"key": "Boro_Force", "nome": "Boro Force 15"}, {"key": "Produtivo", "nome": "Produtivo"}, {"key": "Produtivo_MZ", "nome": "Produtivo MZ"}, {"key": "Photomix", "nome": "Photomix"}, {"key": "Potenza_K", "nome": "Potenza K"}]}};

const COL_CLASS={
  'Dessecação':'jcol-dss','TS':'jcol-ts','Sulco':'jcol-ts',
  'V3 - V4':'jcol-v4','R1 - R2':'jcol-r1','R3 - R4':'jcol-r3','R5.3':'jcol-r53'
};

let modal='TS', apps=[], idC=0;

function getJanelas(){return['Dessecação', modal==='TS'?'TS':'Sulco','V3 - V4','R1 - R2','R3 - R4','R5.3']}

function setModal(m){
  modal=m;
  document.getElementById('btn-ts').classList.toggle('active',m==='TS');
  document.getElementById('btn-sulco').classList.toggle('active',m==='Sulco');
  updateFases(); render(); renderList();
}

function updateFases(){
  const sel=document.getElementById('sel-fase');
  const cur=sel.value;
  sel.innerHTML=getJanelas().map(j=>`<option value="${j}">${j}</option>`).join('');
  if(getJanelas().includes(cur))sel.value=cur;
}

function updateProds(){
  const cat=document.getElementById('sel-cat').value;
  const sel=document.getElementById('sel-prod');
  sel.innerHTML=cat
    ?CATEGORIAS[cat].produtos.map(p=>`<option value="${p.key}">${p.nome}</option>`).join('')
    :'<option value="">— selecione o segmento —</option>';
}

function addApp(){
  const fase=document.getElementById('sel-fase').value;
  const cat=document.getElementById('sel-cat').value;
  const pk=document.getElementById('sel-prod').value;
  const dose=document.getElementById('inp-dose').value.trim();
  const obs=document.getElementById('inp-obs').value.trim();
  if(!fase||!cat||!pk){alert('Selecione a fase, o segmento e o produto.');return;}
  const nome=CATEGORIAS[cat].produtos.find(p=>p.key===pk)?.nome||pk;
  apps.push({id:idC++,cat,pk,nome,jan:fase,dose,obs});
  document.getElementById('inp-dose').value='';
  document.getElementById('inp-obs').value='';
  // fase (sel-fase) is intentionally NOT reset — keeps flow fast for multiple products in same fase
  renderList(); render();
}

function removeApp(id, evt){
  if(evt) evt.stopPropagation();
  apps=apps.filter(a=>a.id!==id);
  renderList(); render();
}

function editCard(id){
  const a=apps.find(x=>x.id===id);
  if(!a) return;
  const novaDose=prompt(`Editar dose de ${a.nome}:`, a.dose||'');
  if(novaDose===null) return; // cancelled
  a.dose=novaDose.trim();
  renderList(); render();
}

function renderList(){
  const el=document.getElementById('app-list');
  if(!apps.length){el.innerHTML='<p class="empty-msg">Nenhuma aplicação adicionada</p>';return;}
  el.innerHTML=apps.map(a=>`
    <div class="app-item">
      <div class="app-dot" style="background:${CATEGORIAS[a.cat].color}"></div>
      <div class="app-info"><div class="app-name">${a.nome}</div>
      <div class="app-meta">${a.jan}${a.dose?' · '+a.dose:''}${a.obs?' · '+a.obs:''}</div></div>
      <button class="app-rm" onclick="removeApp(${a.id})">×</button>
    </div>`).join('');
}

function render(){
  const janelas=getJanelas();
  const prod=document.getElementById('f-prod').value;
  const faz=document.getElementById('f-faz').value;
  const safra=document.getElementById('f-safra').value;
  const area=document.getElementById('f-area').value;

  document.getElementById('tl-title').textContent=prod||'Programa de Posicionamento – Soja';
  const parts=[];
  if(faz)parts.push(faz);
  if(safra)parts.push('Safra '+safra);
  if(area)parts.push(parseInt(area).toLocaleString('pt-BR')+' ha');
  document.getElementById('tl-sub').textContent=parts.length?' · '+parts.join(' · '):'';

  // Columns
  const row=document.getElementById('janelas-row');
  row.innerHTML=janelas.map(j=>{
    const jApps=apps.filter(a=>a.jan===j);
    const cards=jApps.map(a=>{
      const img=IMGS[a.pk]||'';
      const col=CATEGORIAS[a.cat].color;
      return `<div class="prod-card" style="border-left-color:${col};background:${col}16" onclick="editCard(${a.id})">
        <div class="card-x" onclick="removeApp(${a.id},event)">×</div>
        ${img?`<img class="prod-img" src="${img}" alt="${a.nome}">`:''}
        <div><div class="p-name" style="color:${col}">${a.nome}</div>${a.dose?`<div class="p-dose">${a.dose}</div>`:''}</div>
      </div>`;
    }).join('');
    const cls=COL_CLASS[j]||'jcol-r53';
    return `<div class="janela-col ${cls}">
      <div class="j-header">${j}</div>
      <div class="app-cards">${cards}</div>
    </div>`;
  }).join('');

  // Legend
  const usedCats=[...new Set(apps.map(a=>a.cat))];
  document.getElementById('legend').innerHTML=usedCats.map(c=>
    `<div class="legend-item"><div class="legend-dot" style="background:${CATEGORIAS[c].color}"></div><span>${c}</span></div>`
  ).join('');
}

// Init — sem persistência entre sessões: cada manejo é montado do zero, sob medida para o produtor
document.getElementById('logo-img').src=IMGS.logo;
document.getElementById('escala-img').src=IMGS.escala;
updateFases();
renderList();
render();
</script>
</body>
</html>
